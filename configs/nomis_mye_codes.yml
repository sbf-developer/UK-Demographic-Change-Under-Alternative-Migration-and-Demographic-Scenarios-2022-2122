# RM032 resident_age_5c_id → inclusive age range for disaggregation
RM032_AGE_BANDS:
  "1": [0, 24]    # Aged 24 years and under
  "2": [25, 34]   # Aged 25 to 34 years
  "3": [35, 49]   # Aged 35 to 49 years
  "4": [50, 64]   # Aged 50 to 64 years
  "5": [65, 100]  # Aged 65 years and over (open-ended to age 100)
