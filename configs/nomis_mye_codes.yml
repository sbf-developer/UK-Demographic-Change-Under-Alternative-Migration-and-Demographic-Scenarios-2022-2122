DATASET_ID: NM_2002_1
MEASURES_CODE: "20100"
DIM_GEOGRAPHY: geography
DIM_GENDER: gender
DIM_AGE: c_age
DIM_MEASURES: measures
DIM_DATE: date

# Nomis internal geography codes (mid-2022 rebased series)
NATION_GEO_CODES:
  england: "2092957699"
  wales: "2013265930"

# gender: 1 = male, 2 = female (0 = total aggregate — do not use when summing)
GENDER_MALE: "1"
